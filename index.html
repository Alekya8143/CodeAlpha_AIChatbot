<!DOCTYPE html>
<html>

<head>
<title>AI Smart Chatbot</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.chatbox{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
text-align:left;
}

.user{
background:#4CAF50;
color:white;
padding:8px;
border-radius:10px;
margin:5px;
display:inline-block;
}

.bot{
background:#ddd;
padding:8px;
border-radius:10px;
margin:5px;
display:inline-block;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>🤖 AI Smart Chatbot</h2>

<div class="chatbox">

<div id="messages"></div>

<input type="text" id="userInput" placeholder="Ask anything..." />

<button onclick="sendMessage()">Send</button>

</div>

<script src="script.js"></script>

</body>
</html>
