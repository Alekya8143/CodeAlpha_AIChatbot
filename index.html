<!DOCTYPE html>
<html>

<head>
<title>AI Smart Chatbot</title>

<style>

body{
font-family:Arial;
background:#6a11cb;
background:linear-gradient(to right,#6a11cb,#2575fc);
text-align:center;
padding-top:50px;
}

.chatbox{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

#messages{
height:250px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
text-align:left;
}

input{
width:65%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>🤖 AI Smart Chatbot</h2>

<div class="chatbox">

<div id="messages"></div>

<input id="userInput" placeholder="Ask something">

<button onclick="sendMessage()">Send</button>

</div>

<script src="script.js"></script>

</body>

</html>
