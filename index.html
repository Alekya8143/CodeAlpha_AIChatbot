<!DOCTYPE html>
<html>
<head>

<title>AI Smart Chatbot</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

.chatbox{
width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px gray;
}

.dark .chatbox{
background:#1e1e1e;
}

#messages{
height:320px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
display:flex;
flex-direction:column;
}

.user{
background:#4facfe;
color:white;
padding:10px;
border-radius:20px;
margin:5px;
align-self:flex-end;
max-width:70%;
}

.bot{
background:#e5e5ea;
padding:10px;
border-radius:20px;
margin:5px;
align-self:flex-start;
max-width:70%;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px;
margin:3px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>🤖 AI Smart Chatbot</h2>

<button onclick="toggleDark()">🌙</button>

<div class="chatbox">

<div id="messages"></div>

<input type="text" id="userInput" placeholder="Ask anything..." />

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤</button>

</div>

<script src="script.js"></script>

</body>
</html>
